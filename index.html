<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DosePed</title>

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
background:#edf6ff;
font-family:Arial;
margin:0;
padding:0;
}

.card{
background:white;
padding:20px;
border-radius:22px;
margin-top:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #d1d5db;
margin-top:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
background:#2563eb;
color:white;
padding:15px;
border:none;
border-radius:14px;
margin-top:15px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.title{
font-size:34px;
font-weight:bold;
color:#1e3a8a;
}

.subtitle{
color:#64748b;
margin-top:-5px;
}

.suggestion{
padding:14px;
border-bottom:1px solid #eee;
cursor:pointer;
background:white;
}

.suggestion:hover{
background:#dbeafe;
}

.section{
margin-top:16px;
}

.label{
font-weight:bold;
color:#1d4ed8;
margin-bottom:5px;
}

.result{
background:#dbeafe;
padding:16px;
border-radius:16px;
margin-top:15px;
}

.redflag{
background:#fee2e2;
padding:10px;
border-radius:12px;
margin-top:10px;
color:#991b1b;
font-size:14px;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const medicamentos = [

{
nome:"Flumazenil",

categoria:"Antagonista benzodiazepínico",

indicacao:"Intoxicação por benzodiazepínicos",

formulacoes:[

{
nome:"Ampola EV",

via:"EV",

concentracao:0.1,

doseMgKg:0.01,

administracao:"Endovenoso lento em 15 segundos",

repeticao:"Pode repetir a cada 60 segundos",

doseMaxima:"1 mg total",

apresentacao:"Ampola 5 mL — 0,1 mg/mL",

diluicao:"Sem necessidade de diluição"
}

],

redFlags:[
"Uso crônico de benzodiazepínicos",
"Convulsões",
"Coingestão com antidepressivos tricíclicos"
]

},

{
nome:"Dipirona",

categoria:"Analgésico e antitérmico",

indicacao:"Dor e febre",

formulacoes:[

{
nome:"Gotas VO",

via:"VO",

concentracao:500,

gotasPorMl:20,

doseMgKg:15,

administracao:"Via oral",

repeticao:"A cada 6 horas",

doseMaxima:"1 g por dose",

apresentacao:"500 mg/mL — frasco gotas",

diluicao:"Sem necessidade"
},

{
nome:"Ampola EV",

via:"EV",

concentracao:500,

doseMgKg:15,

administracao:"EV lento",

repeticao:"A cada 6 horas",

doseMaxima:"1 g por dose",

apresentacao:"1 g/2 mL",

diluicao:"Diluir em SF 0,9%"
}

],

redFlags:[
"Hipotensão se EV rápido",
"Alergia a pirazolônicos",
"Agranulocitose rara"
]

}

];

function App(){

const [busca,setBusca] = React.useState("");

const [peso,setPeso] = React.useState("");

const [idade,setIdade] = React.useState("");

const [idadeTipo,setIdadeTipo] = React.useState("");

const [selecionado,setSelecionado] = React.useState(null);

const [formulacao,setFormulacao] = React.useState(null);

const [resultado,setResultado] = React.useState(null);

const sugestoes = medicamentos.filter(m =>
m.nome.toLowerCase().includes(busca.toLowerCase())
);

function selecionarMedicamento(med){

setSelecionado(med);

setBusca(med.nome);

setFormulacao(med.formulacoes[0]);

setResultado(null);

}

function calcular(){

if(!peso){
alert("Digite o peso");
return;
}

if(!idade){
alert("Digite a idade");
return;
}

if(!idadeTipo){
alert("Selecione meses ou anos");
return;
}

const pesoFloat = parseFloat(peso);

const dose = pesoFloat * formulacao.doseMgKg;

const volume = dose / formulacao.concentracao;

let gotas = null;

if(formulacao.gotasPorMl){

gotas = Math.round(
volume * formulacao.gotasPorMl
);

}

setResultado({
dose:dose.toFixed(2),
volume:volume.toFixed(2),
gotas
});

}

return(

<div className="max-w-xl mx-auto p-4">

<div className="card">

<div className="title">
DosePed
</div>

<div className="subtitle">
Calculadora pediátrica profissional
</div>

<input

placeholder="🔎 Pesquisa rápida..."

value={busca}

onChange={(e)=>{

setBusca(e.target.value);

setSelecionado(null);

}}

/>

{
busca.length > 0 &&
!selecionado &&

<div className="mt-2 border rounded-xl overflow-hidden">

{
sugestoes.map((m,index)=>(

<div

key={index}

className="suggestion"

onClick={()=>selecionarMedicamento(m)}

>

<b>{m.nome}</b>

<br/>

<span style={{fontSize:"13px"}}>
{m.categoria}
</span>

</div>

))
}

</div>
}

{
selecionado && formulacao &&

<div className="card">

<h1 style={{
fontSize:"30px",
fontWeight:"bold"
}}>
{selecionado.nome}
</h1>

<div style={{
color:"#2563eb",
fontWeight:"bold",
marginTop:"5px"
}}>
{selecionado.categoria}
</div>

<div className="section">

<div className="label">
INDICAÇÃO
</div>

<div>
{selecionado.indicacao}
</div>

</div>

<div className="section">

<div className="label">
FORMULAÇÃO
</div>

<select

value={formulacao.nome}

onChange={(e)=>{

const f = selecionado.formulacoes.find(
x => x.nome === e.target.value
);

setFormulacao(f);

}}

>

{
selecionado.formulacoes.map((f,index)=>(

<option key={index}>
{f.nome}
</option>

))
}

</select>

</div>

<div className="section">

<div className="label">
APRESENTAÇÃO
</div>

<div>
{formulacao.apresentacao}
</div>

</div>

<input

type="number"

placeholder="Peso do paciente (kg)"

value={peso}

onChange={(e)=>setPeso(e.target.value)}

/>

<input

type="number"

placeholder="Idade do paciente"

value={idade}

onChange={(e)=>setIdade(e.target.value)}

/>

<select

value={idadeTipo}

onChange={(e)=>setIdadeTipo(e.target.value)}

>

<option value="">
Selecione idade
</option>

<option value="meses">
Meses
</option>

<option value="anos">
Anos
</option>

</select>

<button onClick={calcular}>
CALCULAR DOSE
</button>

{
resultado &&

<div className="result">

<div>

<b>DOSE CALCULADA</b>

<br/>

{resultado.dose} mg

</div>

<br/>

<div>

<b>VOLUME</b>

<br/>

{resultado.volume} mL

</div>

{
resultado.gotas &&

<>

<br/>

<div>

<b>GOTAS</b>

<br/>

{resultado.gotas} gotas

</div>

</>

}

<br/>

<div>

<b>VIA</b>

<br/>

{formulacao.via}

</div>

<br/>

<div>

<b>ADMINISTRAÇÃO</b>

<br/>

{formulacao.administracao}

</div>

<br/>

<div>

<b>REPETIÇÃO</b>

<br/>

{formulacao.repeticao}

</div>

<br/>

<div>

<b>DOSE MÁXIMA</b>

<br/>

{formulacao.doseMaxima}

</div>

<br/>

<div>

<b>DILUIÇÃO</b>

<br/>

{formulacao.diluicao}

</div>

</div>
}

<div className="section">

<div className="label">
🚨 RED FLAGS
</div>

{
selecionado.redFlags.map((r,index)=>(

<div
key={index}
className="redflag"
>

{r}

</div>

))
}

</div>

</div>
}

</div>

</div>

)

}

ReactDOM.createRoot(
document.getElementById("root")
).render(<App/>)

</script>

</body>
</html>
