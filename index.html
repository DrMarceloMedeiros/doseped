<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DosePed</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
background:#eef6ff;
font-family:Arial;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-top:15px;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #cbd5e1;
margin-top:10px;
font-size:16px;
}

button{
background:#2563eb;
color:white;
padding:14px;
border-radius:14px;
width:100%;
font-weight:bold;
margin-top:15px;
}

.suggestion{
padding:12px;
background:white;
border-bottom:1px solid #eee;
cursor:pointer;
}

.suggestion:hover{
background:#dbeafe;
}

.title{
font-size:32px;
font-weight:bold;
color:#1e3a8a;
}

.subtitle{
color:#64748b;
font-size:14px;
margin-top:-5px;
}

.section-title{
font-weight:bold;
color:#1e40af;
margin-top:14px;
font-size:15px;
}

.result{
background:#dbeafe;
padding:15px;
border-radius:14px;
margin-top:15px;
}

.redflag{
background:#fee2e2;
padding:10px;
border-radius:10px;
margin-top:10px;
color:#991b1b;
font-size:14px;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const medicamentos = [

{
nome:"Flumazenil",
categoria:"Antagonista benzodiazepínico",
indicacao:"Intoxicação por benzodiazepínicos",
doseMgKg:0.01,
concentracao:0.1,
administracao:"EV lento em 15 segundos",
repeticao:"Pode repetir a cada 60 segundos",
doseMaxima:"1 mg total",
diluicao:"Sem necessidade de diluição",
apresentacao:"Ampola 5 mL — 0,1 mg/mL",
redFlags:[
"Uso crônico de benzodiazepínicos",
"Convulsões",
"Coingestão com antidepressivos tricíclicos"
]
},

{
nome:"Naloxona",
categoria:"Antagonista opioide",
indicacao:"Intoxicação por opioides",
doseMgKg:0.01,
concentracao:0.4,
administracao:"EV lento",
repeticao:"Repetir a cada 2-3 minutos",
doseMaxima:"2 mg por dose",
diluicao:"Sem necessidade",
apresentacao:"Ampola 1 mL — 0,4 mg/mL",
redFlags:[
"Recidiva respiratória",
"Opioides longa duração",
"Abstinência aguda"
]
}

];

function App(){

const [busca,setBusca] = React.useState("");
const [peso,setPeso] = React.useState("");
const [idade,setIdade] = React.useState("");
const [selecionado,setSelecionado] = React.useState(null);
const [resultado,setResultado] = React.useState(null);

const sugestoes = medicamentos.filter(m =>
m.nome.toLowerCase().includes(busca.toLowerCase())
);

function selecionarMedicamento(med){
setSelecionado(med);
setBusca(med.nome);
}

function calcular(){

if(!selecionado || !peso) return;

const dose = peso * selecionado.doseMgKg;

const volume = dose / selecionado.concentracao;

setResultado({
dose:dose.toFixed(2),
volume:volume.toFixed(2)
});

}

return(

<div className="max-w-xl mx-auto p-4">

<div className="card">

<div className="title">
DosePed
</div>

<div className="subtitle">
Calculadora pediátrica profissional
</div>

<input
placeholder="🔎 Pesquisa rápida..."
value={busca}
onChange={(e)=>{
setBusca(e.target.value);
setSelecionado(null);
}}
/>

{
busca.length > 0 &&
!selecionado &&

<div className="mt-2 rounded-xl overflow-hidden border">

{
sugestoes.map((m,index)=>(
<div
key={index}
className="suggestion"
onClick={()=>selecionarMedicamento(m)}
>
<b>{m.nome}</b>
<br/>
<span style={{fontSize:"13px"}}>
{m.categoria}
</span>
</div>
))
}

</div>
}

{
selecionado &&

<div className="card">

<h1 style={{fontSize:"28px",fontWeight:"bold"}}>
{selecionado.nome}
</h1>

<div style={{color:"#2563eb",fontWeight:"bold"}}>
{selecionado.categoria}
</div>

<div className="section-title">
INDICAÇÃO
</div>

<div>
{selecionado.indicacao}
</div>

<div className="section-title">
APRESENTAÇÃO
</div>

<div>
{selecionado.apresentacao}
</div>

<input
type="number"
placeholder="PESO (kg)"
value={peso}
onChange={(e)=>setPeso(e.target.value)}
/>

<input
placeholder="IDADE (anos ou meses)"
value={idade}
onChange={(e)=>setIdade(e.target.value)}
/>

<button onClick={calcular}>
CALCULAR DOSE
</button>

{
resultado &&

<div className="result">

<div>
<b>DOSE CALCULADA:</b>
<br/>
{resultado.dose} mg
</div>

<br/>

<div>
<b>VOLUME:</b>
<br/>
{resultado.volume} mL
</div>

<br/>

<div>
<b>ADMINISTRAÇÃO:</b>
<br/>
{selecionado.administracao}
</div>

<br/>

<div>
<b>REPETIÇÃO:</b>
<br/>
{selecionado.repeticao}
</div>

<br/>

<div>
<b>DOSE MÁXIMA:</b>
<br/>
{selecionado.doseMaxima}
</div>

<br/>

<div>
<b>DILUIÇÃO:</b>
<br/>
{selecionado.diluicao}
</div>

</div>
}

<div className="section-title">
🚨 RED FLAGS
</div>

{
selecionado.redFlags.map((r,index)=>(
<div key={index} className="redflag">
{r}
</div>
))
}

</div>
}

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
