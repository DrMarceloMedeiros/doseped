<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DosePed</title>

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
padding:0;
background:#eaf4ff;
font-family:Arial, sans-serif;
}

.app{
max-width:520px;
margin:auto;
padding:18px;
padding-bottom:80px;
}

.logo{
font-size:46px;
font-weight:900;
color:#2563eb;
margin-top:10px;
}

.subtitle{
color:#64748b;
font-size:15px;
margin-top:-5px;
}

.searchBox{
background:white;
border-radius:22px;
padding:16px;
margin-top:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.searchInput{
width:100%;
padding:18px;
border-radius:16px;
border:1px solid #dbeafe;
font-size:18px;
outline:none;
box-sizing:border-box;
}

.quickTitle{
font-weight:bold;
margin-top:20px;
margin-bottom:12px;
color:#1e3a8a;
font-size:18px;
}

.quickButton{
background:white;
padding:15px;
border-radius:16px;
margin-bottom:10px;
font-weight:bold;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
border:1px solid #dbeafe;
transition:0.2s;
}

.quickButton:hover{
background:#dbeafe;
}

.suggestion{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
transition:0.2s;
}

.suggestion:hover{
background:#dbeafe;
}

.card{
background:white;
padding:20px;
border-radius:22px;
margin-top:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
animation:fadeUp 0.25s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0px);
}
}

.medTitle{
font-size:32px;
font-weight:900;
color:#111827;
}

.medCategory{
color:#2563eb;
font-weight:bold;
margin-top:5px;
}

.label{
font-weight:bold;
color:#1d4ed8;
margin-top:18px;
margin-bottom:7px;
font-size:15px;
}

.select{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid #d1d5db;
font-size:17px;
margin-top:8px;
background:white;
}

.greenButton{
width:100%;
padding:20px;
border:none;
background:#22c55e;
border-radius:18px;
font-size:20px;
font-weight:900;
color:black;
margin-top:30px;
cursor:pointer;
transition:0.2s;
}

.greenButton:hover{
background:#16a34a;
}

.resultTop{
background:#2563eb;
color:white;
padding:22px;
border-radius:18px;
margin-top:25px;
text-align:center;
animation:fadeUp 0.25s ease;
}

.resultTopText{
font-size:36px;
font-weight:900;
}

.resultTopSub{
font-size:18px;
margin-top:5px;
}

.infoBox{
background:#f8fafc;
padding:16px;
border-radius:16px;
margin-top:14px;
}

.redFlag{
background:#fee2e2;
padding:12px;
border-radius:14px;
margin-top:10px;
color:#991b1b;
font-size:14px;
font-weight:bold;
}

.ageTypeContainer{
display:flex;
gap:10px;
margin-top:15px;
}

.ageButton{
flex:1;
padding:14px;
border-radius:14px;
border:2px solid #dbeafe;
font-weight:bold;
cursor:pointer;
background:white;
color:#1e3a8a;
transition:0.2s;
}

.ageButton.active{
background:#2563eb;
color:white;
border-color:#2563eb;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const medicamentos = [

{
nome:"Dipirona",

categoria:"Analgésico e antitérmico",

indicacao:"Dor e febre",

idadeMinimaMeses:0,

formulacoes:[

{
nome:"Gotas VO",

via:"VO",

concentracao:500,

gotasPorMl:20,

doseMgKg:15,

administracao:"Via oral",

repeticao:"A cada 6 horas",

doseMaxima:"1 g por dose",

apresentacao:"500 mg/mL — frasco gotas",

diluicao:"Sem necessidade"
},

{
nome:"Ampola EV",

via:"EV",

concentracao:500,

doseMgKg:15,

administracao:"EV lento",

repeticao:"A cada 6 horas",

doseMaxima:"1 g por dose",

apresentacao:"1 g/2 mL",

diluicao:"Diluir em SF 0,9%"
}

],

redFlags:[
"Hipotensão se EV rápido",
"Alergia a pirazolônicos",
"Agranulocitose rara"
]

},

{
nome:"Flumazenil",

categoria:"Antagonista benzodiazepínico",

indicacao:"Intoxicação por benzodiazepínicos",

idadeMinimaMeses:0,

formulacoes:[

{
nome:"Ampola EV",

via:"EV",

concentracao:0.1,

doseMgKg:0.01,

administracao:"EV lento em 15 segundos",

repeticao:"Pode repetir a cada 60 segundos",

doseMaxima:"1 mg total",

apresentacao:"Ampola 5 mL — 0,1 mg/mL",

diluicao:"Sem necessidade de diluição"
}

],

redFlags:[
"Uso crônico de benzodiazepínicos",
"Convulsões",
"Coingestão com antidepressivos tricíclicos"
]

},

{
nome:"Loratadina",

categoria:"Antialérgico",

indicacao:"Rinite alérgica e urticária",

idadeMinimaMeses:24,

formulacoes:[

{
nome:"Xarope VO",

via:"VO",

concentracao:1,

doseMgKg:0.2,

administracao:"Via oral",

repeticao:"1x ao dia",

doseMaxima:"10 mg/dia",

apresentacao:"1 mg/mL",

diluicao:"Sem necessidade"
}

],

redFlags:[
"Contraindicado abaixo de 2 anos sem avaliação médica"
]

}

];

const atalhos = [
"Dipirona",
"Flumazenil",
"Loratadina",
"Dramin",
"Dexametasona",
"Hidrocortisona",
"Ondansetrona",
"Adrenalina"
];

const exemplos = [
"Dipirona",
"Epinefrina",
"Metilprednisolona",
"Hidrocortisona",
"Metoclopramida"
];

function App(){

const [textoAnimado,setTextoAnimado] = React.useState("");

React.useEffect(()=>{

let fraseIndex = 0;
let letra = 0;
let apagando = false;

const interval = setInterval(()=>{

const fraseAtual = exemplos[fraseIndex];

if(!apagando){

setTextoAnimado(
fraseAtual.substring(0, letra + 1)
);

letra++;

if(letra === fraseAtual.length){
apagando = true;
}

}else{

setTextoAnimado(
fraseAtual.substring(0, letra - 1)
);

letra--;

if(letra === 0){

apagando = false;

fraseIndex++;

if(fraseIndex >= exemplos.length){
fraseIndex = 0;
}

}

}

},120);

return ()=>clearInterval(interval);

},[]);

const [busca,setBusca] = React.useState("");

const [selecionado,setSelecionado] = React.useState(null);

const [formulacao,setFormulacao] = React.useState(null);

const [peso,setPeso] = React.useState("");

const [idade,setIdade] = React.useState("");

const [idadeTipo,setIdadeTipo] = React.useState("");

const [resultado,setResultado] = React.useState(null);

const [alerta,setAlerta] = React.useState("");

const sugestoes = medicamentos.filter(m =>
m.nome.toLowerCase().includes(busca.toLowerCase())
);

const cardRef = React.useRef(null);

const resultRef = React.useRef(null);

function selecionarMedicamento(med){

setSelecionado(med);

setBusca(med.nome);

setFormulacao(med.formulacoes[0]);

setResultado(null);

setTimeout(()=>{

cardRef.current?.scrollIntoView({
behavior:"smooth"
});

},200);

}

function calcular(){

if(!peso || !idade || !idadeTipo){

alert("Preencha peso e idade");

return;
}

const idadeMeses = idadeTipo === "anos"
? idade * 12
: idade;

if(
selecionado.idadeMinimaMeses &&
idadeMeses < selecionado.idadeMinimaMeses
){

setAlerta(
`Medicamento recomendado apenas acima de ${selecionado.idadeMinimaMeses} meses`
);

}else{

setAlerta("");

}

const dose = peso * formulacao.doseMgKg;

const volume = dose / formulacao.concentracao;

let gotas = null;

if(formulacao.gotasPorMl){

gotas = Math.round(
volume * formulacao.gotasPorMl
);

}

setResultado({
dose:dose.toFixed(2),
volume:volume.toFixed(2),
gotas
});

setTimeout(()=>{

resultRef.current?.scrollIntoView({
behavior:"smooth"
});

},250);

}

return(

<div className="app">

<div className="logo">
DosePed
</div>

<div className="subtitle">
Calculadora pediátrica profissional
</div>

<div className="searchBox">

<input

className="searchInput"

placeholder={textoAnimado}

value={busca}

onChange={(e)=>{

setBusca(e.target.value);

setSelecionado(null);

}}

onKeyDown={(e)=>{

if(e.key === "Enter"){

const med = medicamentos.find(
m =>
m.nome.toLowerCase() === busca.toLowerCase()
);

if(med){
selecionarMedicamento(med);
}

}

}}

/>

{
busca.length > 0 &&
!selecionado &&

<div style={{marginTop:"10px"}}>

{
sugestoes.map((m,index)=>(

<div

key={index}

className="suggestion"

onClick={()=>selecionarMedicamento(m)}

>

<b>{m.nome}</b>

<br/>

<span style={{fontSize:"13px"}}>
{m.categoria}
</span>

</div>

))
}

</div>
}

</div>

{
!selecionado &&

<>

<div className="quickTitle">
⚡ Mais usados na urgência
</div>

{
atalhos.map((item,index)=>(

<div

key={index}

className="quickButton"

onClick={()=>{

const med = medicamentos.find(
m => m.nome === item
);

if(med){
selecionarMedicamento(med);
}

}}

>

{item}

</div>

))
}

</>

}

{
selecionado && formulacao &&

<div
className="card"
ref={cardRef}
>

<div className="medTitle">
{selecionado.nome}
</div>

<div className="medCategory">
{selecionado.categoria}
</div>

<div className="label">
INDICAÇÃO
</div>

<div>
{selecionado.indicacao}
</div>

<div className="label">
FORMULAÇÃO
</div>

<select

className="select"

value={formulacao.nome}

onChange={(e)=>{

const f = selecionado.formulacoes.find(
x => x.nome === e.target.value
);

setFormulacao(f);

}}

>

{
selecionado.formulacoes.map((f,index)=>(

<option
key={index}
value={f.nome}
>

{f.nome}

</option>

))
}

</select>

<div className="label">
APRESENTAÇÃO
</div>

<div>
{formulacao.apresentacao}
</div>

<div className="label">
PESO DO PACIENTE
</div>

<select

className="select"

value={peso}

onChange={(e)=>setPeso(Number(e.target.value))}

>

<option value="">
Selecione o peso
</option>

{
Array.from({length:80},(_,i)=>i+1).map(num=>(

<option
key={num}
value={num}
>

{num} kg

</option>

))
}

</select>

<div className="label">
IDADE
</div>

<select

className="select"

value={idade}

onChange={(e)=>setIdade(Number(e.target.value))}

>

<option value="">
Selecione a idade
</option>

{
Array.from({length:24},(_,i)=>i+1).map(num=>(

<option
key={num}
value={num}
>

{num}

</option>

))
}

</select>

<div className="ageTypeContainer">

<button

type="button"

className={
idadeTipo === "meses"
? "ageButton active"
: "ageButton"
}

onClick={()=>{
setIdadeTipo("meses");
}}

>

MESES

</button>

<button

type="button"

className={
idadeTipo === "anos"
? "ageButton active"
: "ageButton"
}

onClick={()=>{
setIdadeTipo("anos");
}}

>

ANOS

</button>

</div>

<button

className="greenButton"

onClick={calcular}

>

CALCULAR DOSE

</button>

{
resultado &&

<>

<div
className="resultTop"
ref={resultRef}
>

<div className="resultTopText">

{
resultado.gotas
? `${resultado.gotas} GOTAS`
: `${resultado.volume} mL`
}

</div>

<div className="resultTopSub">
{formulacao.via}
</div>

</div>

<div className="infoBox">

<b>DOSE CALCULADA</b>

<br/><br/>

{resultado.dose} mg

</div>

<div className="infoBox">

<b>ADMINISTRAÇÃO</b>

<br/><br/>

{formulacao.administracao}

</div>

<div className="infoBox">

<b>REPETIÇÃO</b>

<br/><br/>

{formulacao.repeticao}

</div>

<div className="infoBox">

<b>DOSE MÁXIMA</b>

<br/><br/>

{formulacao.doseMaxima}

</div>

<div className="infoBox">

<b>DILUIÇÃO</b>

<br/><br/>

{formulacao.diluicao}

</div>

{
alerta &&

<div className="redFlag">
🚨 {alerta}
</div>

}

<div className="label">
🚨 RED FLAGS
</div>

{
selecionado.redFlags.map((r,index)=>(

<div
key={index}
className="redFlag"
>

{r}

</div>

))
}

</>

}

</div>
}

</div>

);

}

ReactDOM.createRoot(
document.getElementById("root")
).render(<App/>);

</script>

</body>
</html>
