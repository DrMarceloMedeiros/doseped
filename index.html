<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DosePed</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#f4f8fb;
    font-family:Arial;
}

.card{
    transition:0.2s;
}

.card:hover{
    transform:scale(1.01);
}

.search-item:hover{
    background:#eff6ff;
}
</style>
</head>

<body class="min-h-screen">

<div class="max-w-3xl mx-auto p-4">

<div class="bg-blue-700 text-white p-5 rounded-3xl shadow-xl">

<h1 class="text-3xl font-bold">
DosePed
</h1>

<p class="mt-2 text-blue-100">
Emergência Pediátrica e Toxicologia
</p>

</div>

<div class="mt-5 bg-white rounded-3xl shadow p-4">

<label class="font-bold text-lg">
🔎 PESQUISA RÁPIDA
</label>

<input
id="searchInput"
type="text"
placeholder="Digite medicamento, antídoto ou protocolo..."
class="w-full mt-3 border-2 border-blue-200 rounded-2xl p-4 text-lg outline-none focus:border-blue-500"
/>

<div
id="suggestions"
class="mt-2 rounded-2xl overflow-hidden border border-gray-100"
></div>

</div>

<div
id="protocolContainer"
class="mt-5"
></div>

</div>

<script>

const database = [

{
    id:"naloxona",
    nome:"Naloxona",
    aliases:["opioides","opioide","fentanil","morfina"],
    categoria:"Toxicologia",
    antidoto:"Reversão opioides",
    dose:"0,01 mg/kg IV",
    concentracao:"0,4 mg/mL",
    redFlags:[
        "Apneia persistente",
        "Recidiva após bolus",
        "Metadona/fentanil"
    ],
    protocolo:[
        "Repetir a cada 2-3 minutos",
        "Pode necessitar infusão contínua",
        "Monitorização respiratória contínua"
    ],
    calculadora:{
        tipo:"simples",
        mgKg:0.01,
        concentracao:0.4
    }
},

{
    id:"flumazenil",
    nome:"Flumazenil",
    aliases:["benzodiazepinicos","midazolam","diazepam"],
    categoria:"Toxicologia",
    antidoto:"Reversão benzodiazepínicos",
    dose:"0,01 mg/kg IV",
    concentracao:"0,1 mg/mL",
    redFlags:[
        "Convulsões",
        "Uso crônico BZD",
        "Coingestão ATC"
    ],
    protocolo:[
        "Usar apenas em casos selecionados",
        "Monitorização contínua",
        "Risco de recidiva"
    ],
    calculadora:{
        tipo:"simples",
        mgKg:0.01,
        concentracao:0.1
    }
},

{
    id:"paracetamol",
    nome:"N-Acetilcisteína (NAC)",
    aliases:["paracetamol","acetaminofen","nac"],
    categoria:"Toxicologia",
    antidoto:"Intoxicação por Paracetamol",
    dose:"150 mg/kg → 50 mg/kg → 100 mg/kg",
    concentracao:"200 mg/mL",
    redFlags:[
        "INR elevado",
        "Hipoglicemia",
        "Encefalopatia"
    ],
    protocolo:[
        "Bolsa 1: 150 mg/kg em 1h",
        "Bolsa 2: 50 mg/kg em 4h",
        "Bolsa 3: 100 mg/kg em 16h"
    ],
    calculadora:{
        tipo:"nac",
        concentracao:200
    }
}

];

const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");
const protocolContainer = document.getElementById("protocolContainer");

input.addEventListener("input", () => {

    const value = input.value.toLowerCase();

    suggestions.innerHTML = "";

    if(value.length === 0){
        protocolContainer.innerHTML = "";
        return;
    }

    const results = database.filter(item =>
        item.nome.toLowerCase().includes(value) ||
        item.aliases.some(a => a.includes(value))
    );

    results.forEach(item => {

        const div = document.createElement("div");

        div.className =
        "search-item p-4 border-b cursor-pointer";

        div.innerHTML = `
            <strong>${item.nome}</strong>
            <br>
            <span class="text-sm text-gray-500">
            ${item.categoria}
            </span>
        `;

        div.onclick = () => {
            renderProtocol(item);
            suggestions.innerHTML = "";
            input.value = item.nome;
        };

        suggestions.appendChild(div);

    });

});

function renderProtocol(item){

    let calculatorHTML = "";

    if(item.calculadora.tipo === "simples"){

        calculatorHTML = `
        <div class="mt-4">

            <label class="font-bold">
            PESO (kg)
            </label>

            <input
            id="peso"
            type="number"
            class="w-full border p-3 rounded-xl mt-2"
            placeholder="Ex: 15"
            />

            <button
            onclick="calcularDose('${item.id}')"
            class="w-full bg-blue-700 text-white p-3 rounded-2xl mt-3 font-bold"
            >
            CALCULAR DOSE
            </button>

            <div
            id="resultado"
            class="mt-4 bg-blue-50 p-4 rounded-2xl hidden"
            ></div>

        </div>
        `;
    }

    if(item.calculadora.tipo === "nac"){

        calculatorHTML = `
        <div class="mt-4">

            <label class="font-bold">
            PESO (kg)
            </label>

            <input
            id="peso"
            type="number"
            class="w-full border p-3 rounded-xl mt-2"
            placeholder="Ex: 15"
            />

            <button
            onclick="calcularNAC()"
            class="w-full bg-blue-700 text-white p-3 rounded-2xl mt-3 font-bold"
            >
            CALCULAR NAC
            </button>

            <div
            id="resultado"
            class="mt-4 bg-yellow-50 p-4 rounded-2xl hidden"
            ></div>

        </div>
        `;
    }

    protocolContainer.innerHTML = `
    <div class="card bg-white rounded-3xl shadow-xl p-5">

        <div class="flex justify-between items-center">

            <div>
                <h2 class="text-2xl font-bold">
                ${item.nome}
                </h2>

                <p class="text-blue-700 font-semibold mt-1">
                ${item.antidoto}
                </p>
            </div>

        </div>

        <div class="mt-5">

            <p>
            <strong>DOSE:</strong>
            ${item.dose}
            </p>

            <p class="mt-2">
            <strong>CONCENTRAÇÃO:</strong>
            ${item.concentracao}
            </p>

        </div>

        ${calculatorHTML}

        <div class="mt-6">

            <h3 class="font-bold text-red-600 text-lg">
            🚨 RED FLAGS
            </h3>

            <ul class="mt-3 space-y-2">
            ${
                item.redFlags.map(r =>
                    `<li class="bg-red-50 p-3 rounded-xl">${r}</li>`
                ).join("")
            }
            </ul>

        </div>

        <div class="mt-6">

            <h3 class="font-bold text-blue-700 text-lg">
            📋 PROTOCOLO
            </h3>

            <ul class="mt-3 space-y-2">
            ${
                item.protocolo.map(p =>
                    `<li class="bg-blue-50 p-3 rounded-xl">${p}</li>`
                ).join("")
            }
            </ul>

        </div>

    </div>
    `;
}

function calcularDose(id){

    const peso = parseFloat(document.getElementById("peso").value);

    const med = database.find(m => m.id === id);

    const mg = peso * med.calculadora.mgKg;

    const ml = mg / med.calculadora.concentracao;

    const resultado = document.getElementById("resultado");

    resultado.classList.remove("hidden");

    resultado.innerHTML = `
        <h3 class="font-bold text-lg">
        RESULTADO AUTOMÁTICO
        </h3>

        <div class="mt-3 space-y-2">

            <div class="bg-white p-3 rounded-xl">
                <strong>DOSE:</strong>
                ${mg.toFixed(2)} mg
            </div>

            <div class="bg-white p-3 rounded-xl">
                <strong>VOLUME:</strong>
                ${ml.toFixed(2)} mL
            </div>

        </div>
    `;
}

function calcularNAC(){

    const peso = parseFloat(document.getElementById("peso").value);

    const resultado = document.getElementById("resultado");

    const bolsa1 = peso * 150;
    const bolsa2 = peso * 50;
    const bolsa3 = peso * 100;

    resultado.classList.remove("hidden");

    resultado.innerHTML = `
    <h3 class="font-bold text-lg">
    PROTOCOLO NAC 21H
    </h3>

    <div class="mt-4 space-y-3">

        <div class="bg-white p-3 rounded-xl">
            <strong>Bolsa 1:</strong>
            ${bolsa1.toFixed(0)} mg
        </div>

        <div class="bg-white p-3 rounded-xl">
            <strong>Bolsa 2:</strong>
            ${bolsa2.toFixed(0)} mg
        </div>

        <div class="bg-white p-3 rounded-xl">
            <strong>Bolsa 3:</strong>
            ${bolsa3.toFixed(0)} mg
        </div>

    </div>
    `;
}

</script>

</body>
</html>
