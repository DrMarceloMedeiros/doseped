<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>DosePed</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#f1f5f9;
      font-family:Arial, sans-serif;
    }
  </style>
</head>

<body>

<div class="max-w-6xl mx-auto p-4">

  <div class="bg-white rounded-3xl shadow p-6 mb-6">
    <h1 class="text-4xl font-bold text-blue-700">
      DosePed
    </h1>

    <p class="text-slate-500 mt-2">
      Emergência Pediátrica & Toxicologia
    </p>
  </div>

  <div class="bg-white rounded-3xl shadow p-6 mb-6">

    <h2 class="text-xl font-bold mb-4 text-blue-700">
      PESQUISA RÁPIDA
    </h2>

    <input
      type="text"
      placeholder="Pesquisar intoxicação ou medicamento..."
      class="w-full border rounded-2xl p-4 bg-slate-50"
    />

    <div class="flex flex-wrap gap-3 mt-4">

      <button class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl">
        Naloxona
      </button>

      <button class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl">
        Flumazenil
      </button>

      <button class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl">
        NAC
      </button>

    </div>

  </div>

  <div class="grid md:grid-cols-2 gap-6">

    <div class="bg-white rounded-3xl shadow p-6">

      <h2 class="text-2xl font-bold text-blue-700 mb-4">
        PROTOCOLO
      </h2>

      <h3 class="text-xl font-bold mb-2">
        Opioides
      </h3>

      <p class="mb-4">
        Antídoto: Naloxona
      </p>

      <div class="space-y-3">

        <div class="bg-slate-50 p-4 rounded-2xl">
          ABCDE + suporte ventilatório
        </div>

        <div class="bg-slate-50 p-4 rounded-2xl">
          Monitorização contínua
        </div>

        <div class="bg-slate-50 p-4 rounded-2xl">
          Titular Naloxona até ventilação adequada
        </div>

      </div>

    </div>

    <div class="bg-white rounded-3xl shadow p-6">

      <h2 class="text-2xl font-bold text-blue-700 mb-4">
        CALCULADORA
      </h2>

      <label class="font-bold">
        PESO
      </label>

      <input
        id="peso"
        type="number"
        value="18"
        class="w-full border rounded-2xl p-4 mt-2 mb-4 bg-slate-50"
      />

      <button
        onclick="calcular()"
        class="bg-blue-600 text-white w-full p-4 rounded-2xl font-bold"
      >
        CALCULAR
      </button>

      <div
        id="resultado"
        class="bg-blue-50 rounded-2xl p-5 mt-5"
      >
      </div>

    </div>

  </div>

</div>

<script>

function calcular(){

  const peso =
    parseFloat(document.getElementById('peso').value);

  const dose =
    peso * 0.01;

  const volume =
    dose / 0.4;

  document.getElementById('resultado').innerHTML = `

    <p class="text-sm text-blue-700 font-bold mb-2">
      RESULTADO AUTOMÁTICO
    </p>

    <p class="text-3xl font-bold">
      ${dose.toFixed(2)} mg
    </p>

    <p class="mt-3 text-xl">
      ${volume.toFixed(2)} mL
    </p>

    <p class="mt-3 text-slate-600">
      Naloxona 0,4 mg/mL
    </p>

  `;
}

calcular();

</script>

</body>
</html>
