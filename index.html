<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DosePed</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#eff6ff;
font-family:Arial;
}
</style>
</head>

<body>

<div class="max-w-6xl mx-auto p-4">

<div class="bg-white rounded-3xl shadow-xl p-6 mb-6">

<h1 class="text-4xl font-bold text-blue-700">
DosePed
</h1>

<p class="text-slate-500 mt-2">
Emergência Pediátrica & Toxicologia
</p>

</div>

<div class="bg-white rounded-3xl shadow-xl p-6 mb-6">

<h2 class="text-2xl font-bold text-blue-700 mb-4">
PESQUISA RÁPIDA
</h2>

<input
id="pesquisa"
type="text"
placeholder="Digite opioides, paracetamol, benzodiazepínicos..."
class="w-full border rounded-2xl p-4 bg-slate-50 text-lg"
oninput="buscar()"
/>

<div class="flex flex-wrap gap-3 mt-5">

<button onclick="selecionar('opioides')" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-bold">
Naloxona
</button>

<button onclick="selecionar('benzodiazepinicos')" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-bold">
Flumazenil
</button>

<button onclick="selecionar('paracetamol')" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-bold">
NAC
</button>

</div>

</div>

<div class="grid md:grid-cols-2 gap-6">

<div class="bg-white rounded-3xl shadow-xl p-6">

<h2 class="text-2xl font-bold text-blue-700 mb-5">
PROTOCOLO
</h2>

<div id="protocolo"></div>

</div>

<div class="bg-white rounded-3xl shadow-xl p-6">

<h2 class="text-2xl font-bold text-blue-700 mb-5">
CALCULADORA
</h2>

<label class="font-bold text-lg">
PESO
</label>

<input
id="peso"
type="number"
value="18"
class="w-full border rounded-2xl p-4 mt-2 bg-slate-50 text-xl"
/>

<button
onclick="calcular()"
class="bg-blue-600 text-white w-full p-4 rounded-2xl font-bold mt-4 text-lg"
>
CALCULAR DOSE
</button>

<div
id="resultado"
class="bg-blue-50 rounded-2xl p-5 mt-5"
></div>

</div>

</div>

</div>

<script>

const banco = {

opioides:{
nome:"Opioides",
antidoto:"Naloxona",
doseMgKg:0.01,
concentracao:0.4,

manejo:[
"ABCDE e suporte ventilatório",
"Monitorização contínua",
"Titulagem da naloxona até ventilação adequada"
],

redFlags:[
"Apneia persistente",
"Hipercapnia",
"Rebaixamento refratário"
],

internacao:[
"Necessidade de múltiplas doses",
"Ventilação assistida",
"Opioide de longa ação"
]

},

benzodiazepinicos:{
nome:"Benzodiazepínicos",
antidoto:"Flumazenil",
doseMgKg:0.01,
concentracao:0.1,

manejo:[
"Suporte ventilatório",
"Monitorização contínua",
"Evitar flumazenil em usuários crônicos"
],

redFlags:[
"Convulsões",
"Coingestão de ATC",
"Hipoventilação persistente"
],

internacao:[
"Recidiva após flumazenil",
"Coingestão",
"Suporte ventilatório"
]

},

paracetamol:{
nome:"Paracetamol",
antidoto:"NAC",
doseMgKg:150,
concentracao:200,

manejo:[
"Iniciar NAC precocemente",
"Monitorar AST/ALT/INR",
"Usar nomograma Rumack-Matthew"
],

redFlags:[
"INR elevado",
"Hipoglicemia",
"Encefalopatia"
],

internacao:[
"Hepatotoxicidade",
"Atraso no tratamento",
"Transaminases elevadas"
]

}

};

let atual = "opioides";

function selecionar(id){

atual = id;

renderizar();

calcular();

}

function buscar(){

const texto =
document.getElementById('pesquisa')
.value
.toLowerCase();

if(texto.includes('opio')){
selecionar('opioides');
}

if(texto.includes('benza')){
selecionar('benzodiazepinicos');
}

if(texto.includes('para')){
selecionar('paracetamol');
}

if(texto.includes('nalox')){
selecionar('opioides');
}

if(texto.includes('flum')){
selecionar('benzodiazepinicos');
}

if(texto.includes('nac')){
selecionar('paracetamol');
}

}

function renderizar(){

const item = banco[atual];

document.getElementById('protocolo').innerHTML = `

<h3 class="text-3xl font-bold mb-2">
${item.nome}
</h3>

<p class="text-xl mb-4">
<b>Antídoto:</b> ${item.antidoto}
</p>

<h4 class="font-bold text-blue-700 mb-2">
MANEJO
</h4>

<div class="space-y-2 mb-5">
${item.manejo.map(m=>`
<div class="bg-slate-50 p-3 rounded-xl">
${m}
</div>
`).join('')}
</div>

<h4 class="font-bold text-red-700 mb-2">
🚨 RED FLAGS
</h4>

<div class="space-y-2 mb-5">
${item.redFlags.map(m=>`
<div class="bg-red-50 text-red-700 p-3 rounded-xl font-bold">
${m}
</div>
`).join('')}
</div>

<h4 class="font-bold text-orange-700 mb-2">
INTERNAÇÃO
</h4>

<div class="space-y-2">
${item.internacao.map(m=>`
<div class="bg-orange-50 p-3 rounded-xl">
${m}
</div>
`).join('')}
</div>

`;

}

function calcular(){

const peso =
parseFloat(document.getElementById('peso').value);

const item = banco[atual];

const dose =
peso * item.doseMgKg;

const volume =
dose / item.concentracao;

document.getElementById('resultado').innerHTML = `

<p class="text-sm text-blue-700 font-bold mb-2">
RESULTADO AUTOMÁTICO
</p>

<p class="text-3xl font-bold">
${dose.toFixed(2)} mg
</p>

<p class="text-2xl mt-3">
${volume.toFixed(2)} mL
</p>

<p class="mt-4 text-slate-600">
${item.antidoto}
</p>

`;

}

renderizar();

calcular();

</script>

</body>
</html>
